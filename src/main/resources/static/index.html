<link rel="stylesheet" href="/style.css">
<body>

<h1 class="main-title">Digital Wallet</h1>

<div class="layout">

    <!-- USER REGISTRATION -->
    <div class="card">
        <h2>Create Account</h2>

        <input id="username" placeholder="Username">
        <input id="email" placeholder="Email">
        <input id="mobile" placeholder="Mobile">

        <button onclick="registerUser()">Register User</button>
    </div>


    <!-- WALLET DASHBOARD -->
    <div class="card">

        <h2>Wallet Dashboard</h2>

        <input id="userId" placeholder="Enter User ID">

        <button onclick="checkBalance()">Check Balance</button>

        <p id="balance"></p>

        <hr>

        <h3>Deposit</h3>

        <input id="depositAmount" placeholder="Amount">

        <button onclick="depositMoney()">Deposit Money</button>

        <hr>

        <h3>Withdraw</h3>

        <input id="withdrawAmount" placeholder="Amount">

        <button onclick="withdrawMoney()">Withdraw Money</button>

        <hr>

        <h3>Transactions</h3>

        <button onclick="getTransactions()">Load Transactions</button>

        <ul id="transactions"></ul>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>

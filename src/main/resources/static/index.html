<!DOCTYPE html>

<html>

<head>
    <title>Digital Wallet</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

<h1 class="title">Digital Wallet</h1>

<div class="container">

    <div class="card">
        <h2>Create User</h2>

        <input id="username" placeholder="Username">
        <input id="email" placeholder="Email">
        <input id="mobile" placeholder="Mobile">

        <button onclick="registerUser()">Register</button>

    </div>

    <div class="card">

        <h2>Wallet</h2>

        <input id="userId" placeholder="User ID">

        <button onclick="checkBalance()">Check Balance</button>

        <p id="balance"></p>

        <h3>Deposit</h3>

        <input id="depositAmount" placeholder="Amount">

        <button onclick="depositMoney()">Deposit</button>

        <h3>Withdraw</h3>

        <input id="withdrawAmount" placeholder="Amount">

        <button onclick="withdrawMoney()">Withdraw</button>

    </div>

    <div class="card">

        <h2>Transfer Money</h2>

        <input id="senderId" placeholder="Sender ID">
        <input id="receiverId" placeholder="Receiver ID">
        <input id="transferAmount" placeholder="Amount">

        <button onclick="transferMoney()">Transfer</button>

    </div>

</div>

<script src="/script.js"></script>

</body>
</html>
